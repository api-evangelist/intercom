naftiko: 1.0.0-alpha2
info:
  label: Intercom API — Contacts
  description: 'Intercom API — Contacts. 3 operations. Lead operation: List contacts. Self-contained Naftiko capability covering
    one Intercom business surface.'
  tags:
  - Intercom
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERCOM_API_KEY: INTERCOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: intercom-contacts
    baseUri: https://api.intercom.io
    description: Intercom API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: listcontacts
        method: GET
        description: List contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: per_page
          in: query
          type: integer
        - name: starting_after
          in: query
          type: string
      - name: createcontact
        method: POST
        description: Create a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: contacts-contact_id
      path: /contacts/{contact_id}
      operations:
      - name: getcontact
        method: GET
        description: Retrieve a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contact_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.INTERCOM_API_KEY}}'
  exposes:
  - type: rest
    namespace: intercom-contacts-rest
    port: 8080
    description: REST adapter for Intercom API — Contacts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: GET
        name: listcontacts
        description: List contacts
        call: intercom-contacts.listcontacts
        with:
          per_page: rest.per_page
          starting_after: rest.starting_after
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcontact
        description: Create a contact
        call: intercom-contacts.createcontact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/contacts/{contact-id}
      name: contacts-contact-id
      description: REST surface for contacts-contact_id.
      operations:
      - method: GET
        name: getcontact
        description: Retrieve a contact
        call: intercom-contacts.getcontact
        with:
          contact_id: rest.contact_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: intercom-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Intercom API — Contacts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-contacts
      description: List contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: intercom-contacts.listcontacts
      with:
        per_page: tools.per_page
        starting_after: tools.starting_after
      outputParameters:
      - type: object
        mapping: $.
    - name: create-contact
      description: Create a contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: intercom-contacts.createcontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-contact
      description: Retrieve a contact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: intercom-contacts.getcontact
      with:
        contact_id: tools.contact_id
      outputParameters:
      - type: object
        mapping: $.
