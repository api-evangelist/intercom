naftiko: 1.0.0-alpha2
info:
  label: Intercom API
  description: The Intercom API provides programmatic access to the Intercom AI-powered customer service platform. It enables
    developers to manage contacts, companies, conversations, articles, segments, messages, and data events, and to build seamless
    integrations with the Intercom Help Desk and Messenger.
  tags:
  - Intercom
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: intercom
    baseUri: https://api.intercom.io
    description: Intercom API HTTP API.
    authentication:
      type: bearer
      token: '{{INTERCOM_TOKEN}}'
    resources:
    - name: me
      path: /me
      operations:
      - name: getme
        method: GET
        description: Identify an admin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: admins
      path: /admins
      operations:
      - name: listadmins
        method: GET
        description: List admins
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: contacts
      path: /contacts
      operations:
      - name: listcontacts
        method: GET
        description: List contacts
        inputParameters:
        - name: per_page
          in: query
          type: integer
        - name: starting_after
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcontact
        method: POST
        description: Create a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: contacts-contact-id
      path: /contacts/{contact_id}
      operations:
      - name: getcontact
        method: GET
        description: Retrieve a contact
        inputParameters:
        - name: contact_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: companies
      path: /companies
      operations:
      - name: listcompanies
        method: GET
        description: List companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createorupdatecompany
        method: POST
        description: Create or update a company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: conversations
      path: /conversations
      operations:
      - name: listconversations
        method: GET
        description: List conversations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createconversation
        method: POST
        description: Create a conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: conversations-conversation-id
      path: /conversations/{conversation_id}
      operations:
      - name: getconversation
        method: GET
        description: Retrieve a conversation
        inputParameters:
        - name: conversation_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: articles
      path: /articles
      operations:
      - name: listarticles
        method: GET
        description: List articles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createarticle
        method: POST
        description: Create an article
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: segments
      path: /segments
      operations:
      - name: listsegments
        method: GET
        description: List segments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: messages
      path: /messages
      operations:
      - name: createmessage
        method: POST
        description: Create a message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: events
      path: /events
      operations:
      - name: submitevent
        method: POST
        description: Submit a data event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listevents
        method: GET
        description: List data events
        inputParameters:
        - name: type
          in: query
          type: string
        - name: user_id
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: news-news-items
      path: /news/news_items
      operations:
      - name: listnewsitems
        method: GET
        description: List news items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createnewsitem
        method: POST
        description: Create a news item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
