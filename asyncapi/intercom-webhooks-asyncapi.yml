  schemas:
    NotificationEvent:
      type: object
      description: |-
        Common Intercom notification envelope. Every webhook delivery is a
        `notification_event` object with the topic-specific payload under
        `data.item`.
      required:
        - type
        - id
        - topic
        - app_id
        - data
      properties:
        type:
          type: string
          const: notification_event
        id:
          type: string
          description: Unique identifier of this notification (e.g. `notif_ccd8a4d0-...`).
        topic:
          type: string
          description: The webhook topic that triggered this delivery.
        app_id:
          type: string
          description: Intercom app identifier the subscription belongs to.
        created_at:
          type: integer
          format: int64
          description: Unix epoch seconds when Intercom produced the notification.
        delivery_attempts:
          type: integer
          minimum: 1
          description: Number of HTTP delivery attempts (starts at 1).
        first_sent_at:
          type: integer
          format: int64
          description: Unix epoch seconds of the first delivery attempt.
        self:
          type: string
          nullable: true
          description: Optional canonical URL for the notification, when present.
        delivery_status:
          type: string
          description: Delivery status reported by Intercom (e.g. `retry`).
          nullable: true
        links:
          type: object
          description: Optional related links object.
          additionalProperties: true
        data:
          type: object
          required: [item]
          properties:
            item:
              type: object
              description: Topic-specific payload object.
              additionalProperties: true
      additionalProperties: true

    AdminEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/Admin'

    ActivityLogEventEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/ActivityLogEvent'

    ArticleEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/Article'

    CompanyEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/Company'

    CompanyContactRelationEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/CompanyContactRelation'

    ContactEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/Contact'

    ContactTagEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/ContactTagAssignment'

    ConversationEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/Conversation'

    DataEventEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/DataEvent'

    TicketEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/Ticket'

    SubscriptionEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/SubscriptionChange'

    ContentStatEnvelope:
      allOf:
        - $ref: '#/components/schemas/NotificationEvent'
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  $ref: '#/components/schemas/ContentStat'

    Admin:
      type: object
      description: Intercom admin (teammate). Field set mirrors the Admin REST object.
      properties:
        type: { type: string, const: admin }
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        job_title: { type: string }
        away_mode_enabled: { type: boolean }
        away_mode_reassign: { type: boolean }
        has_inbox_seat: { type: boolean }
        team_ids:
          type: array
          items: { type: integer }
      additionalProperties: true

    ActivityLogEvent:
      type: object
      description: Admin activity log entry as published in the workspace audit log.
      properties:
        type: { type: string, const: activity_log_event }
        id: { type: string }
        performed_by:
          type: object
          properties:
            id: { type: string }
            email: { type: string, format: email }
            ip: { type: string }
        created_at: { type: integer, format: int64 }
        activity_type: { type: string }
        activity_description: { type: string }
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true

    Article:
      type: object
      description: Help center article object.
      properties:
        type: { type: string, const: article }
        id: { type: string }
        workspace_id: { type: string }
        title: { type: string }
        description: { type: string }
        body: { type: string }
        author_id: { type: integer }
        state:
          type: string
          enum: [published, draft]
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }
        url: { type: string, format: uri }
        parent_id:
          type: integer
          nullable: true
        parent_ids:
          type: array
          items: { type: integer }
        parent_type:
          type: string
          nullable: true
      additionalProperties: true

    Company:
      type: object
      description: Company object representing an organisation of contacts.
      properties:
        type: { type: string, const: company }
        id: { type: string }
        company_id: { type: string }
        name: { type: string }
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }
        last_request_at: { type: integer, format: int64, nullable: true }
        size: { type: integer, nullable: true }
        website: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        monthly_spend: { type: number, nullable: true }
        session_count: { type: integer }
        user_count: { type: integer }
        plan:
          type: object
          properties:
            type: { type: string, const: plan }
            id: { type: string }
            name: { type: string }
        custom_attributes:
          type: object
          additionalProperties: true
        tags:
          type: object
          properties:
            type: { type: string, const: tag.list }
            tags:
              type: array
              items: { $ref: '#/components/schemas/Tag' }
        segments:
          type: object
          properties:
            type: { type: string, const: segment.list }
            segments:
              type: array
              items: { $ref: '#/components/schemas/Segment' }
      additionalProperties: true

    CompanyContactRelation:
      type: object
      description: Payload delivered with company.contact.attached and company.contact.detached.
      properties:
        type: { type: string, const: company }
        company: { $ref: '#/components/schemas/Company' }
        contact: { $ref: '#/components/schemas/Contact' }
      additionalProperties: true

    Contact:
      type: object
      description: |-
        Intercom contact. The `role` field distinguishes between user and lead
        contacts. Visitors and leads use the same shape with `role: lead`.
      properties:
        type: { type: string, enum: [contact, user, lead, visitor] }
        id: { type: string }
        external_id:
          type: string
          nullable: true
        workspace_id: { type: string }
        role:
          type: string
          enum: [user, lead, visitor]
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        avatar:
          type: object
          nullable: true
          properties:
            type: { type: string, const: avatar }
            image_url:
              type: string
              format: uri
              nullable: true
        owner_id:
          type: integer
          nullable: true
        social_profiles:
          type: object
          properties:
            type: { type: string, const: list }
            data:
              type: array
              items:
                type: object
                additionalProperties: true
        has_hard_bounced: { type: boolean }
        marked_email_as_spam: { type: boolean }
        unsubscribed_from_emails: { type: boolean }
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }
        signed_up_at: { type: integer, format: int64, nullable: true }
        last_seen_at: { type: integer, format: int64, nullable: true }
        last_replied_at: { type: integer, format: int64, nullable: true }
        last_contacted_at: { type: integer, format: int64, nullable: true }
        last_email_opened_at: { type: integer, format: int64, nullable: true }
        last_email_clicked_at: { type: integer, format: int64, nullable: true }
        language_override:
          type: string
          nullable: true
        browser:
          type: string
          nullable: true
        browser_version:
          type: string
          nullable: true
        browser_language:
          type: string
          nullable: true
        os:
          type: string
          nullable: true
        location:
          type: object
          additionalProperties: true
        android_app_name:
          type: string
          nullable: true
        android_app_version:
          type: string
          nullable: true
        ios_app_name:
          type: string
          nullable: true
        ios_app_version:
          type: string
          nullable: true
        custom_attributes:
          type: object
          additionalProperties: true
        tags:
          type: object
          properties:
            type: { type: string, const: list }
            data:
              type: array
              items: { $ref: '#/components/schemas/Tag' }
        companies:
          type: object
          properties:
            type: { type: string, const: list }
            data:
              type: array
              items: { $ref: '#/components/schemas/Company' }
        notes:
          type: object
          properties:
            type: { type: string, const: list }
            data:
              type: array
              items:
                type: object
                additionalProperties: true
      additionalProperties: true

    ContactTagAssignment:
      type: object
      description: Payload delivered with contact tag created/deleted topics.
      properties:
        type:
          type: string
          enum: [user_tag, lead_tag, tag]
        tag: { $ref: '#/components/schemas/Tag' }
        user:
          $ref: '#/components/schemas/Contact'
          description: Tagged contact (present when role=user).
        lead:
          $ref: '#/components/schemas/Contact'
          description: Tagged contact (present when role=lead).
      additionalProperties: true

    Tag:
      type: object
      properties:
        type: { type: string, const: tag }
        id: { type: string }
        name: { type: string }
      additionalProperties: true

    Segment:
      type: object
      properties:
        type: { type: string, const: segment }
        id: { type: string }
        name: { type: string }
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }
        person_type:
          type: string
          enum: [user, lead]
      additionalProperties: true

    Conversation:
      type: object
      description: Intercom conversation object as delivered on conversation.* webhooks.
      properties:
        type: { type: string, const: conversation }
        id: { type: string }
        title:
          type: string
          nullable: true
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }
        waiting_since:
          type: integer
          format: int64
          nullable: true
        snoozed_until:
          type: integer
          format: int64
          nullable: true
        open: { type: boolean }
        state:
          type: string
          enum: [open, closed, snoozed]
        read: { type: boolean }
        priority:
          type: string
          enum: [priority, not_priority]
        admin_assignee_id:
          type: integer
          nullable: true
        team_assignee_id:
          type: integer
          nullable: true
        source:
          type: object
          description: The originating message of the conversation.
          properties:
            type: { type: string }
            id: { type: string }
            delivered_as: { type: string }
            subject: { type: string }
            body: { type: string }
            author:
              type: object
              properties:
                type: { type: string, enum: [admin, user, lead, bot, contact] }
                id: { type: string }
                name:
                  type: string
                  nullable: true
                email:
                  type: string
                  format: email
                  nullable: true
            attachments:
              type: array
              items:
                type: object
                additionalProperties: true
            url:
              type: string
              format: uri
              nullable: true
          additionalProperties: true
        contacts:
          type: object
          properties:
            type: { type: string, const: contact.list }
            contacts:
              type: array
              items:
                type: object
                properties:
                  type: { type: string, const: contact }
                  id: { type: string }
                  external_id:
                    type: string
                    nullable: true
        teammates:
          type: object
          nullable: true
          properties:
            type: { type: string, const: admin.list }
            admins:
              type: array
              items:
                type: object
                properties:
                  type: { type: string, const: admin }
                  id: { type: string }
        conversation_parts:
          type: object
          properties:
            type: { type: string, const: conversation_part.list }
            total_count: { type: integer }
            conversation_parts:
              type: array
              items: { $ref: '#/components/schemas/ConversationPart' }
        tags:
          type: object
          properties:
            type: { type: string, const: tag.list }
            tags:
              type: array
              items: { $ref: '#/components/schemas/Tag' }
        statistics:
          type: object
          additionalProperties: true
          nullable: true
        conversation_rating:
          type: object
          nullable: true
          properties:
            rating:
              type: integer
              minimum: 1
              maximum: 5
            remark:
              type: string
              nullable: true
            created_at: { type: integer, format: int64 }
            contact:
              type: object
              properties:
                type: { type: string }
                id: { type: string }
            teammate:
              type: object
              properties:
                type: { type: string, const: admin }
                id: { type: string }
      additionalProperties: true

    ConversationPart:
      type: object
      properties:
        type: { type: string, const: conversation_part }
        id: { type: string }
        part_type:
          type: string
          description: Kind of part (comment, note, assignment, close, open, etc.).
        body:
          type: string
          nullable: true
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }
        notified_at: { type: integer, format: int64 }
        assigned_to:
          type: object
          nullable: true
          properties:
            type: { type: string }
            id: { type: string }
        author:
          type: object
          properties:
            type: { type: string, enum: [admin, user, lead, bot, contact] }
            id: { type: string }
            name:
              type: string
              nullable: true
            email:
              type: string
              format: email
              nullable: true
        attachments:
          type: array
          items:
            type: object
            additionalProperties: true
        external_id:
          type: string
          nullable: true
        redacted: { type: boolean }
      additionalProperties: true

    DataEvent:
      type: object
      description: Custom data event tracked against a contact.
      properties:
        type: { type: string, const: event }
        event_name: { type: string }
        created_at: { type: integer, format: int64 }
        user_id:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        id:
          type: string
          nullable: true
        intercom_user_id:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true

    Ticket:
      type: object
      description: Intercom ticket object delivered on ticket.* webhooks.
      properties:
        type: { type: string, const: ticket }
        id: { type: string }
        ticket_id: { type: string }
        ticket_attributes:
          type: object
          additionalProperties: true
        ticket_state:
          type: string
          enum: [submitted, in_progress, waiting_on_customer, resolved]
        ticket_state_internal_label:
          type: string
        ticket_state_external_label:
          type: string
        category:
          type: string
          nullable: true
        ticket_type:
          type: object
          properties:
            type: { type: string, const: ticket_type }
            id: { type: string }
            name: { type: string }
            description: { type: string }
            category:
              type: string
              nullable: true
            icon: { type: string }
        contacts:
          type: object
          properties:
            type: { type: string, const: contact.list }
            contacts:
              type: array
              items:
                type: object
                properties:
                  type: { type: string, const: contact }
                  id: { type: string }
        admin_assignee_id:
          type: integer
          nullable: true
        team_assignee_id:
          type: integer
          nullable: true
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }
        open: { type: boolean }
        is_shared: { type: boolean }
        snoozed_until:
          type: integer
          format: int64
          nullable: true
        linked_objects:
          type: object
          additionalProperties: true
        ticket_parts:
          type: object
          properties:
            type: { type: string, const: ticket_part.list }
            total_count: { type: integer }
            ticket_parts:
              type: array
              items: { $ref: '#/components/schemas/ConversationPart' }
      additionalProperties: true

    SubscriptionChange:
      type: object
      description: Payload delivered with granular.subscribe and granular.unsubscribe topics.
      properties:
        type: { type: string }
        id: { type: string }
        subscription_id:
          type: string
          description: Identifier of the granular subscription type being changed.
        contact:
          $ref: '#/components/schemas/Contact'
      additionalProperties: true

    ContentStat:
      type: object
      description: |-
        Engagement statistic delivered on content_stat.* topics. The shape varies
        by content type but always identifies the content, the contact, and the
        stat that fired.
      properties:
        type:
          type: string
          description: Identifies the content stat type (e.g. email_stat, post_stat).
        id: { type: string }
        content_id:
          type: string
          description: Identifier of the originating content (email, post, tour, ...).
        content_type:
          type: string
          description: Content kind (e.g. email, post, banner, tour, survey, sms).
        stat:
          type: string
          description: The engagement event (e.g. delivered, opened, clicked, completed, replied, dismissed).
        receipt:
          type: string
          nullable: true
        created_at: { type: integer, format: int64 }
        user:
          $ref: '#/components/schemas/Contact'
        company:
          $ref: '#/components/schemas/Company'
          nullable: true
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true
