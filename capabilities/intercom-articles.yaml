naftiko: 1.0.0-alpha2
info:
  label: Intercom API — Articles
  description: 'Intercom API — Articles. 2 operations. Lead operation: List articles. Self-contained Naftiko capability covering
    one Intercom business surface.'
  tags:
  - Intercom
  - Articles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERCOM_API_KEY: INTERCOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: intercom-articles
    baseUri: https://api.intercom.io
    description: Intercom API — Articles business capability. Self-contained, no shared references.
    resources:
    - name: articles
      path: /articles
      operations:
      - name: listarticles
        method: GET
        description: List articles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createarticle
        method: POST
        description: Create an article
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.INTERCOM_API_KEY}}'
  exposes:
  - type: rest
    namespace: intercom-articles-rest
    port: 8080
    description: REST adapter for Intercom API — Articles. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/articles
      name: articles
      description: REST surface for articles.
      operations:
      - method: GET
        name: listarticles
        description: List articles
        call: intercom-articles.listarticles
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createarticle
        description: Create an article
        call: intercom-articles.createarticle
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: intercom-articles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Intercom API — Articles. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-articles
      description: List articles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: intercom-articles.listarticles
      outputParameters:
      - type: object
        mapping: $.
    - name: create-article
      description: Create an article
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: intercom-articles.createarticle
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
