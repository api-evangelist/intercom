    - path: /events
      name: listevents
      operations:
      - method: GET
        name: listevents
        description: List data events
        call: intercom.listevents
        outputParameters:
        - type: object
          mapping: $.
    - path: /news/news_items
      name: listnewsitems
      operations:
      - method: GET
        name: listnewsitems
        description: List news items
        call: intercom.listnewsitems
        outputParameters:
        - type: object
          mapping: $.
    - path: /news/news_items
      name: createnewsitem
      operations:
      - method: POST
        name: createnewsitem
        description: Create a news item
        call: intercom.createnewsitem
        outputParameters:
