    - path: /segments
      name: listsegments
      operations:
      - method: GET
        name: listsegments
        description: List segments
        call: intercom.listsegments
        outputParameters:
        - type: object
          mapping: $.
    - path: /messages
      name: createmessage
      operations:
      - method: POST
        name: createmessage
        description: Create a message
        call: intercom.createmessage
        outputParameters:
        - type: object
          mapping: $.
    - path: /events
      name: submitevent
      operations:
      - method: POST
        name: submitevent
        description: Submit a data event
        call: intercom.submitevent
        outputParameters:
